services:
  nemoclaw-controller:
    image: node:22-slim
    ports:
      - "18789:18789"
      - "18788:18788"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app
    working_dir: /app
    dns:
      - 8.8.8.8
    command: bash -c "export SANDBOX_NAME=my-assistant && node bin/nemoclaw.js start && tail -f /dev/null"
    environment:
      - TELEGRAM_BOT_TOKEN
      - NVIDIA_API_KEY
